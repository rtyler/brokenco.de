<!DOCTYPE html>
<html lang="en">
<head>
    <title>{{ page.title }}</title>
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
                            content="
     {% if page.excerpt %}{{ page.excerpt | strip_html }}
     {% else %}{{ site.description }}
    {% endif %}"/>
    <meta name="keywords" content="{{page.tags | join: ", " }}" />
    <meta name="robots" content="noodp" />
    <link rel="canonical" href="/" />
    <link rel="stylesheet" href="/assets/css/simple.css">
    <link rel="shortcut icon" href="/img/theme-colors/orange.png">
    <link rel="apple-touch-icon" href="/img/theme-colors/orange.png">
<meta property="og:locale" content="en" />
<meta property="og:title" content="{{page.title}}">
<meta property="og:description"
                            content="
     {% if page.excerpt %}{{ page.excerpt | strip_html }}
     {% else %}{{ site.description }}
    {% endif %}"/>
<meta property="og:url" content="{{ site.url }}{{ page.url }}" />
<meta property="og:site_name" content="brokenco.de" />
{% if page.excerpt %}
<meta property="og:type" content="article" />
<meta property="article:tag" content="{{page.tags | join: ", " }}" />
<meta property="article:published_time" content="{{page.date}}" />
{% else %}
<meta property="og:type" content="website" />
{% endif %}

<link href="/atom.xml" rel="alternate" type="application/rss+xml" title="rtyler's blog" />

</head>
<body class="orange">

<div class="container headings--one-size center">

  <header class="header">
  <div class="header__inner">
    <div class="header__logo">
      <a href="/">
              /
        </a>
    </div>
  </div>

        <nav class="navigation-menu">
                <ul class="navigation-menu">
        <li><a href="/about">About</a></li>
        <li><a href="/tag">Tags</a></li>
        <li><a rel="me" href="https://buoyantdata.social/rtyler">Follow</a></li>
        <li><a href="/atom.xml">Subscribe</a></li>
        </ul>
        </nav>
</header>

<div class="content">
    {{content}}
</div>

<footer class="footer">
  <div class="footer__inner">
      <div class="copyright">
        <span>© 2026
      </div>
        <a href="https://github.com/rtyler/brokenco.de/edit/main/{{ page.path }}">improve this page</a>
  </div>
</footer>
</div>

</body>
</html>
